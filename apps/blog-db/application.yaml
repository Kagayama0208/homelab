apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-db
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kagayama0208/homelab.git
    targetRevision: HEAD
    path: apps/blog-db
  destination:
    server: https://kubernetes.default.svc
    namespace: blog-db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
