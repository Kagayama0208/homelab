apiVersion: v1
kind: Service
metadata:
  name: coredns-external
  namespace: kube-system
  annotations:
    metallb.universe.tf/address-pool: internal-pool
spec:
  selector:
    k8s-app: kube-dns
  type: LoadBalancer
  ports:
  - name: dns
    port: 53
    protocol: UDP
    targetPort: 53
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53