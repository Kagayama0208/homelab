apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bakepyon-ui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kagayama0208/homelab.git
    targetRevision: HEAD
    path: apps/bakepyon-ui
  destination:
    server: https://kubernetes.default.svc
    namespace: bakepyon-ui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
