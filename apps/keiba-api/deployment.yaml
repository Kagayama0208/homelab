apiVersion: apps/v1
kind: Deployment
metadata:
  name: keiba-api
  namespace: keiba
  labels:
    app: keiba-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keiba-api
  template:
    metadata:
      labels:
        app: keiba-api
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: 192.168.10.54:5000/keiba-db-connector:0.0.4
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: keiba-config
            - secretRef:
                name: keiba-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: screenshots
              mountPath: /app/screenshots
            - name: chrome-data
              mountPath: /app/chrome-data
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: screenshots
          emptyDir: {}
        - name: chrome-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keiba-api
  namespace: keiba
  labels:
    app: keiba-api
  annotations:
    metallb.universe.tf/address-pool: internal-pool
spec:
  type: LoadBalancer
  selector:
    app: keiba-api
  ports:
  - port: 8000
    targetPort: 8000
